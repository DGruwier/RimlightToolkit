name: ci

on:
  push:
  pull_request:

jobs:
  core:
    name: Core library and preview harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Generate preview frame
        run: ./build/apps/preview_cli/rtk_preview_cli --out out/preview.ppm --blur 12 --offset-x 18 --offset-y 14 --rim-width 3
